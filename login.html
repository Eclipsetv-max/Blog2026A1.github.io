<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog 2026 - Acceso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="ICON.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d3436 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .login-container {
      text-align: center;
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 90%;
    }

    .lock-icon {
      font-size: 3rem;
      color: #7b2d8e;
      margin-bottom: 30px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .input-group {
      position: relative;
      margin-bottom: 30px;
    }

    .input-group input {
      width: 100%;
      padding: 15px 20px;
      padding-left: 50px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 2px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      border-color: #7b2d8e;
      box-shadow: 0 0 20px rgba(123, 45, 142, 0.2);
    }

    .input-group input::placeholder {
      color: #666;
      letter-spacing: 3px;
    }

    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #7b2d8e;
      font-size: 0.9rem;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 1px solid #7b2d8e;
      border-radius: 4px;
      color: #7b2d8e;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background: #7b2d8e;
      color: #fff;
    }

    .error-message {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 20px;
      letter-spacing: 2px;
      display: none;
    }

    .decorative-line {
      width: 60px;
      height: 1px;
      background: #7b2d8e;
      margin: 20px auto;
      position: relative;
    }

    .decorative-line::before,
    .decorative-line::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 5px;
      border: 1px solid #7b2d8e;
      border-radius: 50%;
    }

    .decorative-line::before {
      left: -12px;
    }

    .decorative-line::after {
      right: -12px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <i class="fas fa-lock lock-icon"></i>
    <h1>Blog 2026</h1>
    <div class="decorative-line"></div>
    <p class="subtitle">Acceso Restringido</p>

    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-key"></i>
        <input type="password" id="password" placeholder="Ingrese la contraseña" autocomplete="off">
      </div>
      <button type="submit" class="submit-btn">Ingresar</button>
      <p class="error-message" id="errorMsg">Contraseña incorrecta</p>
    </form>
  </div>

  <script>
    var correctPassword = "Goleman2026";

    if (sessionStorage.getItem('authenticated') === 'true') {
      window.location.href = 'index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var input = document.getElementById('password').value;
      var errorMsg = document.getElementById('errorMsg');

      if (input === correctPassword) {
        sessionStorage.setItem('authenticated', 'true');
        window.location.href = 'index.html';
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
      }
    });
  </script>

</body>
</html>
